services:
  # ===== 基础设施 =====
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todolist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-todolist}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todolist}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===== 业务服务 =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-todolist} password=${POSTGRES_PASSWORD:-changeme} dbname=${POSTGRES_DB:-todolist} sslmode=disable TimeZone=Asia/Shanghai"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      AUTH_ACCESS_COOKIE: ${AUTH_ACCESS_COOKIE:-todolist_access}
      AUTH_REFRESH_COOKIE: ${AUTH_REFRESH_COOKIE:-todolist_refresh}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-http://localhost:3000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_PASSWORD_CONCURRENCY: ${AUTH_PASSWORD_CONCURRENCY:-4}
      AUTH_LOGIN_IP_LIMIT: ${AUTH_LOGIN_IP_LIMIT:-30}
      AUTH_LOGIN_ACCOUNT_LIMIT: ${AUTH_LOGIN_ACCOUNT_LIMIT:-10}
      AUTH_LOGIN_RATE_WINDOW_SECONDS: ${AUTH_LOGIN_RATE_WINDOW_SECONDS:-60}
      AUTH_LOGIN_RATE_CAPACITY: ${AUTH_LOGIN_RATE_CAPACITY:-4096}
      # Only nginx on auth_proxy can set the authoritative X-Real-IP header.
      # This is intentionally not configurable from the deployment .env.
      AUTH_TRUSTED_PROXY_CIDRS: 172.30.10.2/32
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      default: {}
      auth_proxy:
        ipv4_address: 172.30.10.3
        aliases:
          - backend-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  agent:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${AGENT_SERVICE_PORT:-8000}:8000"
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080/api
      DATABASE_URL: postgresql://${POSTGRES_USER:-todolist}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-todolist}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      AUTH_ACCESS_COOKIE: ${AUTH_ACCESS_COOKIE:-todolist_access}
      AUTH_REFRESH_COOKIE: ${AUTH_REFRESH_COOKIE:-todolist_refresh}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-http://localhost:3000}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
      agent:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://backend:8080
      VITE_WS_URL: ws://agent:8000
    networks:
      default: {}
      auth_proxy:
        ipv4_address: 172.30.10.2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

# The agent and infrastructure remain on the default application network.
# Backend is explicitly on both networks: agent traffic uses "backend" on
# default, while browser Todo API traffic goes through this isolated alias.
# It must stay unavailable to any service other than frontend and backend.
networks:
  auth_proxy:
    internal: true
    ipam:
      config:
        - subnet: 172.30.10.0/29

volumes:
  postgres_data:
  redis_data:
