name: todolist-agent-e2e

services:
  postgres:
    ports: !override
      - "15432:5432"
    volumes:
      - ./data/e2e-init.sql:/docker-entrypoint-initdb.d/20-e2e-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-todolist} -d $${POSTGRES_DB:-todolist}"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    ports: !override
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    ports: !override
      - "18080:8080"
    environment:
      GIN_MODE: release
      LOG_LEVEL: warn
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  agent:
    ports: !override
      - "18000:8000"
    environment:
      LLM_PROVIDER: fake
      LOG_LEVEL: warning
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/api/agent/health').raise_for_status()"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  frontend:
    ports: !override
      - "33000:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
